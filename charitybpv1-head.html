<!DOCTYPE html>
<html lang="zh-Hant" data-lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RETURN｜回到桌前 — 一個香港家族的雙向回鄉敘事</title>
<style>
  :root{--deep-blue:#0A2F44;--gold:#C9A03D;--jade:#1A7F62;--paper:#F5EFE0;--paper-warm:#EFE6D2;--ink:#1B1B1B;--ink-soft:#3a3a3a;--muted:#6b6457;--line:#d9cdb1;--candle:radial-gradient(ellipse at top, rgba(201,160,61,0.18), rgba(245,239,224,0) 60%);}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:Inter,Roboto,system-ui,-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.72;font-size:15.5px}
  html[data-lang="en"] body{font-family:Inter,Roboto,Georgia,system-ui,-apple-system,"Segoe UI",sans-serif}
  .serif{font-family:Georgia,"Source Han Serif SC","Songti SC","SimSun",serif}
  .lang-toggle{position:fixed;top:18px;right:20px;z-index:100;background:rgba(10,47,68,0.92);border:1px solid var(--gold);border-radius:24px;padding:4px;display:flex;gap:0;backdrop-filter:blur(6px);box-shadow:0 4px 14px rgba(10,47,68,0.18)}
  .lang-toggle button{background:transparent;border:0;color:#cfc69f;cursor:pointer;font-family:Georgia,serif;font-size:13px;letter-spacing:.08em;padding:6px 14px;border-radius:20px;transition:all .2s ease}
  .lang-toggle button:hover{color:var(--gold)}
  .lang-toggle button.active{background:var(--gold);color:var(--deep-blue);font-weight:700}
  html[data-lang="zh"] .en-only{display:none}
  html[data-lang="en"] .zh-only{display:none}
  .cover{min-height:88vh;background:var(--candle), linear-gradient(180deg,#0A2F44 0%,#0c3a52 60%,#0A2F44 100%);color:#f6efd9;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:72px 24px;text-align:center;position:relative;overflow:hidden}
  .cover::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 20% 30%, rgba(201,160,61,0.10), transparent 40%),radial-gradient(circle at 80% 70%, rgba(26,127,98,0.10), transparent 45%);pointer-events:none}
  .cover .eyebrow{letter-spacing:.4em;font-size:11px;color:var(--gold);margin-bottom:24px}
  .cover h1{font-family:Georgia,serif;font-size:58px;line-height:1.1;margin:0 0 14px;letter-spacing:.02em}
  .cover h1 .bar{color:var(--gold)}
  .cover .zh-sub{font-size:20px;color:#e8dfc4;margin:0 0 22px;font-weight:300}
  .cover .en-sub{font-family:Georgia,serif;font-style:italic;font-size:17px;color:#cfc69f;max-width:760px;margin:0 auto;line-height:1.6}
  .cover .meta{margin-top:44px;font-size:12px;color:#9a9171;letter-spacing:.2em}
  .cover .ornament{margin:30px auto 0;width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  main{max-width:1120px;margin:0 auto;padding:0 28px}
  section{padding:64px 0;border-bottom:1px solid var(--line)}
  section:last-of-type{border-bottom:none}
  .sec-num{font-family:Georgia,serif;color:var(--gold);letter-spacing:.3em;font-size:11px;margin-bottom:12px}
  h2{font-family:Georgia,serif;font-size:30px;line-height:1.25;color:var(--deep-blue);margin:0 0 8px}
  h2 .en{display:block;font-style:italic;font-size:15px;color:var(--muted);font-weight:400;margin-top:6px;letter-spacing:.04em}
  html[data-lang="en"] h2 .en{display:none}
  h3{font-family:Georgia,serif;font-size:20px;color:var(--deep-blue);margin:26px 0 10px}
  h4{font-size:13px;text-transform:uppercase;letter-spacing:.18em;color:var(--jade);margin:18px 0 8px}
  p{margin:0 0 12px;color:var(--ink-soft)}
  .lead{font-size:17px;color:var(--ink);max-width:880px}
  ul{padding-left:20px;margin:6px 0 12px}
  li{margin-bottom:5px;color:var(--ink-soft)}
  .quote{font-family:Georgia,serif;font-style:italic;font-size:20px;line-height:1.6;color:var(--deep-blue);border-left:3px solid var(--gold);padding:12px 20px;margin:22px 0;background:rgba(201,160,61,0.06)}
  .small{font-size:12.5px;color:var(--muted)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .grid-6{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:20px}
  .card.warm{background:var(--paper-warm)}
  .stat{font-family:Georgia,serif;font-size:30px;color:var(--deep-blue);font-weight:700;line-height:1}
  .stat .unit{font-size:13px;color:var(--muted);margin-left:6px;font-weight:400;font-family:Inter,sans-serif}
  .label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .asset{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:6px;min-height:160px;position:relative;transition:transform .2s ease, box-shadow .2s ease}
  .asset:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,47,68,0.08)}
  .asset .icon{font-size:24px}
  .asset .title{font-family:Georgia,serif;font-size:16px;color:var(--deep-blue);font-weight:700}
  .asset .desc{font-size:13px;color:var(--ink-soft);line-height:1.55}
  .asset .tag{position:absolute;top:12px;right:12px;font-size:10px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
  .timeline{margin:24px 0 6px;padding:24px 0}
  .tl-stages{display:grid;grid-template-columns:repeat(6,1fr);gap:0}
  .tl-dot{width:16px;height:16px;border-radius:50%;background:var(--gold);border:3px solid var(--paper);box-shadow:0 0 0 2px var(--gold);margin:0 auto}
  .tl-stage{padding:14px 8px 0;text-align:center}
  .tl-stage .stagename{font-family:Georgia,serif;color:var(--deep-blue);font-weight:700;font-size:14px;margin-top:12px}
  .tl-stage .when{font-size:11px;color:var(--gold);letter-spacing:.1em;margin-top:4px}
  .tl-rows{margin-top:18px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .tl-row{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:12.5px;line-height:1.5}
  .tl-row.snow{background:#0A2F44;color:#e8dfb8;border-color:#0A2F44}
  .tl-row.family{background:var(--paper-warm)}
  .tl-row .h{font-size:10px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;opacity:.85}
  .tl-row.snow .h{color:var(--gold)}
  .tl-row.family .h{color:var(--jade)}
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:#fff}
  th,td{border:1px solid var(--line);padding:10px 12px;text-align:left;vertical-align:top}
  th{background:var(--paper-warm);font-family:Georgia,serif;color:var(--deep-blue);font-weight:700}
  tbody tr:hover{background:rgba(201,160,61,0.08)}
  .matrix{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:stretch}
  .col{background:#fff;border-top:4px solid var(--gold);border-left:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 20px}
  .col.b{border-top-color:var(--deep-blue)}
  .col.r{border-top-color:var(--jade)}
  .col h3{margin-top:0;font-size:17px}
  .col li{font-size:13.5px;line-height:1.6;margin-bottom:10px}
  .decision{border:2px solid var(--gold);background:linear-gradient(180deg,#fdf8e8 0%, #f5efe0 100%);padding:28px 30px;border-radius:10px;margin-top:26px;box-shadow:0 6px 24px rgba(201,160,61,0.15)}
  .decision h3{margin-top:0;color:var(--deep-blue)}
  .group-hero{background:linear-gradient(135deg,#0A2F44 0%, #0e3d57 100%);color:#f3ead0;border-radius:10px;padding:28px 30px;margin:16px 0 24px;display:grid;grid-template-columns:1.4fr 1fr;gap:28px;align-items:center}
  .group-hero h3{color:var(--gold);margin:0 0 10px;font-size:22px}
  .group-hero p{color:#e2d9bb;font-size:14.5px}
  .badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .badge{background:rgba(201,160,61,0.16);color:var(--gold);font-size:11px;letter-spacing:.06em;padding:5px 11px;border-radius:20px;border:1px solid rgba(201,160,61,0.4)}
  .paths{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:16px 0}
  .path{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;border-top:4px solid var(--gold)}
  .path.two{border-top-color:var(--jade)}
  .path .ptag{font-size:10.5px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase}
  .path.two .ptag{color:var(--jade)}
  .path .amount{font-family:Georgia,serif;font-size:24px;color:var(--deep-blue);font-weight:700;margin:6px 0 10px}
  .rbw-wrap{background:linear-gradient(180deg,#fdf8e8 0%, #f5efe0 100%);border:1px solid var(--line);border-radius:10px;padding:26px;margin-top:16px}
  .systems{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
  .system{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px}
  .system .num{font-family:Georgia,serif;color:var(--gold);font-size:12px;letter-spacing:.18em}
  .system h4{margin:5px 0 6px;color:var(--deep-blue);text-transform:none;letter-spacing:0;font-size:16px;font-family:Georgia,serif}
  .system .en{font-style:italic;color:var(--muted);font-size:12.5px;margin-bottom:6px;display:block}
  .coming{margin-top:16px;border:1px dashed var(--gold);background:rgba(201,160,61,0.06);padding:14px 20px;border-radius:8px;text-align:center;color:var(--deep-blue);font-family:Georgia,serif;font-style:italic}
  .mission{background:#fff;border:1px solid var(--line);border-radius:10px;padding:24px;margin-top:16px;border-left:4px solid var(--jade)}
  .mission .pricetag{display:inline-block;background:var(--deep-blue);color:var(--gold);font-family:Georgia,serif;font-size:14px;letter-spacing:.04em;padding:6px 14px;border-radius:20px;margin-bottom:10px}
  .mission .pricetag .big{font-size:22px;font-weight:700;margin:0 4px}
  .mission-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px}
  .mission-grid .m{background:var(--paper-warm);border:1px solid var(--line);border-radius:8px;padding:14px}
  .mission-grid .m h4{margin:0 0 6px;color:var(--deep-blue);text-transform:none;letter-spacing:0;font-size:14px;font-family:Georgia,serif}
  .mission-grid .m p{font-size:13px;margin:0;color:var(--ink-soft)}
  .impact{background:linear-gradient(180deg,#fdf8e8 0%, var(--paper-warm) 100%);border:1px solid var(--line);border-radius:10px;padding:24px;margin-top:16px;border-left:4px solid var(--gold)}
  .impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}
  .impact-grid .m{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;text-align:center}
  .impact-grid .m .num{font-family:Georgia,serif;font-size:26px;color:var(--deep-blue);font-weight:700;line-height:1.1}
  .impact-grid .m .num .u{font-size:12px;color:var(--muted);font-weight:400;margin-left:3px;font-family:Inter,sans-serif}
  .impact-grid .m .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .impact-grid .m .note{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
  .calc{background:#fff;border:1px dashed var(--line);border-radius:8px;padding:14px 16px;margin-top:14px;font-size:12.5px;color:var(--muted);font-family:Georgia,serif;font-style:italic}
  .calc strong{color:var(--deep-blue);font-style:normal}
  .cadence{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .season{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;border-top:3px solid var(--gold)}
  .season.winter{border-top-color:var(--jade)}
  .season .when{font-family:Georgia,serif;color:var(--gold);font-size:13px;letter-spacing:.1em}
  .season.winter .when{color:var(--jade)}
  .season h4{margin:6px 0 6px;color:var(--deep-blue);text-transform:none;letter-spacing:0;font-size:16px;font-family:Georgia,serif}
  .founders{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
  .founder{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;border-top:4px solid var(--deep-blue)}
  .founder.r{border-top-color:var(--jade)}
  .founder .role{font-size:10.5px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
  .founder h3{margin:6px 0 4px;font-size:20px}
  .founder .sub{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .roadmap{display:grid;grid-template-columns:1fr;gap:6px;margin-top:12px}
  .rm-row{display:grid;grid-template-columns:160px 1fr;gap:16px;padding:12px 16px;background:#fff;border:1px solid var(--line);border-radius:6px}
  .rm-row:hover{background:rgba(201,160,61,0.06)}
  .rm-when{font-family:Georgia,serif;color:var(--gold);font-weight:700;font-size:13.5px}
  .rm-what{font-size:13.5px;color:var(--ink-soft)}
  .names{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:12px}
  .name{background:var(--paper-warm);border:1px solid var(--line);border-radius:8px;padding:18px;text-align:center}
  .name .zh{font-family:Georgia,serif;font-size:18px;color:var(--deep-blue);font-weight:700}
  .name .en{font-family:Georgia,serif;font-style:italic;color:var(--muted);font-size:13px;display:block;margin-top:5px}
  .name .gloss{font-size:11.5px;color:var(--muted);margin-top:6px}
  .origin{background:#fff;border:1px solid var(--line);border-radius:10px;padding:28px;margin-top:14px}
  .origin .pair{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:18px}
  .origin .voice{border-left:3px solid var(--gold);padding-left:16px}
  .origin .voice.r{border-left-color:var(--jade)}
  .origin .voice .who{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  footer{background:var(--deep-blue);color:#cfc69f;text-align:center;padding:36px 24px;font-size:12.5px;letter-spacing:.08em}
  footer .gold{color:var(--gold)}
  @media (max-width: 900px){.grid-2,.grid-3,.grid-6,.matrix,.systems,.paths,.founders,.origin .pair,.mission-grid,.cadence{grid-template-columns:1fr}.impact-grid,.grid-4{grid-template-columns:1fr 1fr}.tl-stages,.tl-rows{grid-template-columns:1fr 1fr 1fr}.group-hero{grid-template-columns:1fr}.cover h1{font-size:40px}.rm-row{grid-template-columns:110px 1fr}.lang-toggle{top:12px;right:12px}}
  @media (max-width: 560px){.tl-stages,.tl-rows,.names,.impact-grid,.grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="lang-toggle" role="group" aria-label="Language toggle">
  <button id="btn-zh" class="active" type="button" onclick="setLang('zh')">中</button>
  <button id="btn-en" type="button" onclick="setLang('en')">EN</button>
</div>

<header class="cover">
  <div class="eyebrow">CHARITY · BLUEPRINT · V1 · 2026.05</div>
  <h1 class="zh-only">RETURN<span class="bar">｜</span>回到桌前</h1>
  <h1 class="en-only">RETURN<span class="bar"> · </span>Back to the Table</h1>
  <p class="zh-sub zh-only">一個香港家族的雙向回鄉敘事</p>
  <p class="zh-sub en-only">A Hong Kong family's two-way return home</p>
  <p class="en-sub">Where East and West, sister and brother, finance and culture, sit at the same table.</p>
  <div class="ornament"></div>
  <div class="meta">HONG KONG · SICHUAN · SINGAPORE · CALIFORNIA</div>
</header>

<main>
